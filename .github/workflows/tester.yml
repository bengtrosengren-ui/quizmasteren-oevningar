name: Kör tester

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Sätt upp Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Installera pytest
        run: pip install pytest
      - name: Kör alla tester
        run: pytest -v
